
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>女巫镇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PeerJS for P2P Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        
        /* Theme: Dark Witch / Black Town */
        :root {
            --bg-paper: #1c1917; /* Lighter Stone for base */
            --bg-panel: rgba(41, 37, 36, 0.90); /* Slightly lighter panel */
            --text-ink: #e7e5e4; 
            --text-muted: #a8a29e;
            --accent-brown: #78350f;
            --accent-gold: #b45309;
            --accent-red: #991b1b;
            --border-color: #57534e;
        }

        body { 
            font-family: 'Noto Serif SC', serif; 
            background-color: var(--bg-paper); 
            color: var(--text-ink); 
            overflow: hidden; 
            /* Radial Gradient + Noise for Depth */
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"),
                radial-gradient(circle at center, #292524 0%, #0c0a09 100%);
            background-blend-mode: overlay, normal;
            background-size: cover;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 1s ease-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translate(0, 20px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
        
        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(8px);
            border: 2px solid #57534e; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border-radius: 8px;
        }
        
        /* Range Slider Customization */
        input[type=range] {
            height: 6px;
            background: #44403c;
            border-radius: 5px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #78350f;
            cursor: pointer;
            border: 2px solid #a8a29e;
        }

        .card-shadow {
             box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Shield, Skull, Zap, Eye, Users, Moon, Gavel, Search, Lock, Heart, Home, Cat, RotateCcw, BookOpen, Play, Hand, X, Layers, Scale, Copy, Check, UserPlus, Crown, Volume2, Settings, Music, Link } from 'lucide-react';

        // --- Constants & Types ---

        const View = {
            LANDING: 'LANDING',
            RULES: 'RULES',
            SETUP_HOST: 'SETUP_HOST',
            JOIN_ROOM: 'JOIN_ROOM',
            WAITING_ROOM: 'WAITING_ROOM',
            CHAR_SELECT: 'CHAR_SELECT',
            GAME: 'GAME'
        };

        const Phase = {
            INITIAL_NIGHT: 'INITIAL_NIGHT',     
            DAY_TURN: 'DAY_TURN',               
            NIGHT_CYCLE: 'NIGHT_CYCLE',         
            NIGHT_WITCH: 'NIGHT_WITCH',
            NIGHT_CONSTABLE: 'NIGHT_CONSTABLE',
            DAWN_PRE_ANNOUNCE: 'DAWN_PRE_ANNOUNCE', 
            DAWN_CONFESSION: 'DAWN_CONFESSION', 
            DAWN_REVEAL: 'DAWN_REVEAL',         
            GAME_OVER: 'GAME_OVER',
            RESOLVE_CONSPIRACY_REVEAL: 'RESOLVE_CONSPIRACY_REVEAL', 
            RESOLVE_CONSPIRACY_ROTATION: 'RESOLVE_CONSPIRACY_ROTATION', 
            RESOLVE_CONSPIRACY_COMPLETED: 'RESOLVE_CONSPIRACY_COMPLETED',
            TRIAL_REVEAL: 'TRIAL_REVEAL'        
        };

        const CardType = {
            TRIAL: 'TRIAL', 
            RED: 'RED',     
            BLUE: 'BLUE',   
            GREEN: 'GREEN', 
            BLACK: 'BLACK'  
        };

        const Identity = {
            VILLAGER: 'VILLAGER',
            WITCH: 'WITCH',
            CONSTABLE: 'CONSTABLE'
        };

        const CHARACTERS = [
            { id: 'official', name: '官员', desc: '每局一次：自首时不翻开身份牌' },
            { id: 'farmer', name: '农民', desc: '玩家死亡时自动获得其所有手牌和蓝卡' },
            { id: 'doctor', name: '医生', desc: '可用「辩护」卡作为「目击」使用' },
            { id: 'landlord', name: '地主', desc: '抽到两张指控时直接额外摸一张' },
            { id: 'girl', name: '少女', desc: '若手牌满足7张指控，可直接审判并奖励摸牌2张' },
            { id: 'storyteller', name: '说书人', desc: '每局一次：抽牌前可调换牌堆顺序' },
            { id: 'judge', name: '法官', desc: '打出第6张指控时可直接审判玩家' },
            { id: 'priest', name: '牧师', desc: '游戏两次：抽牌时可从弃牌堆选两张非黑牌' },
            { id: 'housewife', name: '家庭主妇', desc: '场上无其他玩家身份被翻开时获得一张手牌' },
            { id: 'maid', name: '女仆', desc: '免疫「黑猫」和「情侣」效果' },
            { id: 'tailor', name: '裁缝', desc: '技能与右手边第一名活着的玩家一致' },
            { id: 'strongman', name: '大力士', desc: '需累计8张指控才可审判' },
            { id: 'minister', name: '部长', desc: '对部长打出的「证据」仅算作一张指控' },
            { id: 'child', name: '小孩', desc: '发起审判后清空自身所有指控和证据' },
            { id: 'beggar', name: '乞丐', desc: '免疫「抢劫」和「纵火」' }
        ];

        const DECK_TEMPLATE = [
            { name: '指控', count: 35, type: CardType.RED, icon: Gavel, desc: '放置1个指控标记' },
            { name: '证据', count: 5, type: CardType.RED, icon: Search, desc: '放置3个指控标记' },
            { name: '目击', count: 1, type: CardType.RED, icon: Eye, desc: '放置7个指控标记' },
            { name: '嫁祸', count: 2, type: CardType.GREEN, icon: Users, desc: '转移指控' },
            { name: '抢劫', count: 1, type: CardType.GREEN, icon: Zap, desc: '抢夺一张手牌' },
            { name: '纵火', count: 1, type: CardType.GREEN, icon: Zap, desc: '弃置一名玩家手牌' },
            { name: '诅咒', count: 1, type: CardType.GREEN, icon: Skull, desc: '弃置一张蓝色卡牌' },
            { name: '拘留', count: 3, type: CardType.GREEN, icon: Lock, desc: '失去下一回合' }, 
            { name: '辩护', count: 3, type: CardType.GREEN, icon: Shield, desc: '移除指控' },
            { name: '黑猫', count: 1, type: CardType.BLUE, icon: Cat, desc: '先手行动' },
            { name: '情侣', count: 2, type: CardType.BLUE, icon: Heart, desc: '生死与共' }, 
            { name: '避难', count: 1, type: CardType.BLUE, icon: Home, desc: '免疫指控' }, 
            { name: '信徒', count: 1, type: CardType.BLUE, icon: Users, desc: '死后收益' }, 
            { name: '传染', count: 1, type: CardType.BLACK, icon: Users, desc: '身份轮转' },
            { name: '黑夜', count: 1, type: CardType.BLACK, icon: Moon, desc: '天黑了' }
        ];

        const generateDeck = () => {
            let deck = [];
            let idCounter = 1;
            DECK_TEMPLATE.forEach(template => {
                for (let i = 0; i < template.count; i++) {
                    deck.push({
                        id: `card-${idCounter++}`,
                        name: template.name,
                        type: template.type,
                        icon: template.icon,
                        description: template.desc
                    });
                }
            });
            return deck;
        };

        const shuffle = (array) => {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        };

        const getLivingLeftNeighbor = (playerId, allPlayers) => {
            if (!allPlayers || allPlayers.length === 0) return 0;
            let checkId = (playerId - 1 + allPlayers.length) % allPlayers.length;
            let safety = 0;
            while (allPlayers[checkId] && allPlayers[checkId].isDead && safety < allPlayers.length) {
                checkId = (checkId - 1 + allPlayers.length) % allPlayers.length;
                safety++;
            }
            return checkId;
        };

        const getLivingRightNeighbor = (playerId, allPlayers) => {
            if (!allPlayers || allPlayers.length === 0) return 0;
            let checkId = (playerId + 1) % allPlayers.length;
            let safety = 0;
            while (allPlayers[checkId] && allPlayers[checkId].isDead && safety < allPlayers.length) {
                checkId = (checkId + 1) % allPlayers.length;
                safety++;
            }
            return checkId;
        };

        const getEffectiveRole = (player, allPlayers) => {
            if (!player || player.isDead) return { id: 'unknown', name: '未知' };
            if (player.character.id !== 'tailor') return player.character;
            
            const neighborIndex = getLivingRightNeighbor(player.id, allPlayers);
            const neighbor = allPlayers[neighborIndex];
            if (neighbor.character.id === 'tailor') return { id: 'tailor', name: '裁缝', desc: '复制右侧玩家技能' };
            return neighbor ? neighbor.character : player.character;
        };

        // --- Components ---

        const AvatarImage = ({ charId, alt, className }) => {
            const [src, setSrc] = useState(`./assets/avatars/${charId}.png`);
            
            useEffect(() => {
                setSrc(`./assets/avatars/${charId}.png`);
            }, [charId]);

            const handleError = () => {
                if (src.endsWith('.png')) {
                    setSrc(`./assets/avatars/${charId}.jpg`);
                } 
                else if (!src.includes('dicebear')) {
                    setSrc(`https://api.dicebear.com/7.x/avataaars/svg?seed=${charId}&backgroundColor=292524`); // Dark BG for avatar fallback
                }
            };

            return (
                <img 
                    src={src} 
                    alt={alt} 
                    className={className}
                    onError={handleError}
                />
            );
        };

        const IdentitySelectionModal = ({ player, onClose, onSelect }) => {
            if (!player) return null;

            return (
                <div className="fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                    <div className="bg-[#292524] p-6 rounded-lg shadow-2xl max-w-lg w-full border-2 border-[#78350f] relative">
                        <button onClick={onClose} className="absolute top-2 right-2 text-[#a8a29e] hover:text-white hover:bg-[#1c1917] rounded-full p-1">
                            <X />
                        </button>
                        <h3 className="text-xl font-serif font-bold text-center mb-6 text-[#e7e5e4]">
                            翻开 {player.character.name} 的身份
                        </h3>
                        <div className="flex justify-center gap-4 flex-wrap">
                            {player.identityCards.map((card, idx) => (
                                <div 
                                    key={idx}
                                    onClick={() => {
                                        if (!card.isRevealed) onSelect(idx);
                                    }}
                                    className={`
                                        w-20 h-28 rounded-lg border-4 flex items-center justify-center transition-all shadow-lg
                                        ${card.isRevealed 
                                            ? 'bg-[#44403c] border-[#1c1917] cursor-default' 
                                            : 'bg-[#1c1917] border-[#78350f] hover:scale-105 cursor-pointer hover:ring-4 ring-amber-500/50'
                                        }
                                    `}
                                >
                                    {card.isRevealed ? (
                                        <span className="text-lg font-bold text-[#a8a29e]">
                                            {card.identity === Identity.WITCH ? '女巫' : card.identity === Identity.CONSTABLE ? '警长' : '平民'}
                                        </span>
                                    ) : (
                                        <span className="text-4xl font-bold text-[#78350f] opacity-50">?</span>
                                    )}
                                </div>
                            ))}
                        </div>
                        <p className="text-center mt-6 text-[#a8a29e] text-xs italic font-serif">
                            点击一张背面朝上的卡牌以揭示身份
                        </p>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ onClose, volume, onVolumeChange }) => {
            return (
                <div className="fixed inset-0 z-[300] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                    <div className="bg-[#1c1917] p-6 rounded-lg shadow-2xl max-w-md w-full border-2 border-[#78350f] relative">
                        <button onClick={onClose} className="absolute top-2 right-2 text-[#a8a29e] hover:text-white p-1">
                            <X />
                        </button>
                        <h3 className="text-xl font-serif font-bold text-center mb-6 text-[#e7e5e4] flex items-center justify-center gap-2">
                            <Settings size={24} /> 游戏设置
                        </h3>
                        
                        <div className="space-y-6">
                            <div className="bg-[#292524] p-4 rounded border border-[#44403c]">
                                <div className="flex items-center justify-between mb-2">
                                    <label className="text-[#e7e5e4] font-bold flex items-center gap-2">
                                        <Music size={18} className="text-[#b45309]" /> 背景音乐音量
                                    </label>
                                    <span className="text-[#a8a29e] text-sm">{Math.round(volume * 100)}%</span>
                                </div>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="1" 
                                    step="0.01" 
                                    value={volume}
                                    onChange={(e) => onVolumeChange(parseFloat(e.target.value))}
                                    className="w-full h-2 bg-[#44403c] rounded-lg appearance-none cursor-pointer accent-[#78350f]"
                                />
                            </div>
                        </div>

                        <div className="mt-6 text-center">
                            <button onClick={onClose} className="bg-[#78350f] text-[#e7e5e4] px-6 py-2 rounded font-bold hover:bg-[#92400e] transition-colors border border-[#451a03]">
                                确认
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Card = ({ card, isSelected, onClick, disabled, small }) => {
            const getCardStyle = (type) => {
                switch (type) {
                    case CardType.RED: return 'bg-[#7f1d1d] border-[#450a0a] text-[#fecaca]';
                    case CardType.BLUE: return 'bg-[#1e3a8a] border-[#172554] text-[#bfdbfe]';
                    case CardType.GREEN: return 'bg-[#14532d] border-[#052e16] text-[#bbf7d0]';
                    case CardType.BLACK: return 'bg-[#000000] border-[#292524] text-[#a8a29e]';
                    case CardType.TRIAL: return 'bg-[#44403c] border-[#292524] text-[#d6d3d1]';
                    default: return 'bg-[#44403c] border-[#292524] text-[#d6d3d1]';
                }
            };

            const renderCardContent = () => {
                if (card.name === '指控') return <span className="text-4xl font-bold text-[#ef4444]/80">✕</span>;
                if (card.name === '证据') return <div className="flex gap-0.5 text-[#ef4444]/80"><span className="text-xl font-bold">✕</span><span className="text-xl font-bold">✕</span><span className="text-xl font-bold">✕</span></div>;
                if (card.name === '目击') return (
                    <div className="grid grid-cols-4 gap-x-1 gap-y-0 leading-none text-[#ef4444]/80">
                        {[...Array(7)].map((_, i) => <span key={i} className="text-[10px] font-bold">✕</span>)}
                    </div>
                );
                if (card.name === '黑猫') return <Cat className={small ? 'w-6 h-6' : 'w-10 h-10'} />;

                const Icon = card.icon;
                return <Icon className={small ? 'w-6 h-6' : 'w-8 h-8'} />;
            };

            return (
                <div 
                    onClick={() => !disabled && onClick && onClick(card)}
                    className={`
                        relative border-[3px] rounded-lg flex flex-col items-center justify-center
                        transition-all duration-200 cursor-pointer card-shadow select-none
                        ${small ? 'w-12 h-16 text-[8px]' : 'w-20 h-28 md:w-24 md:h-32 text-xs'}
                        ${isSelected ? 'ring-4 ring-amber-600 transform -translate-y-4 z-10' : ''}
                        ${disabled ? 'opacity-60 grayscale cursor-not-allowed' : 'hover:-translate-y-2 hover:shadow-xl hover:border-white/20'}
                        ${getCardStyle(card.type)}
                    `}
                >
                    {renderCardContent()}
                    <div className="text-center font-bold mt-1 leading-tight px-1 tracking-widest font-serif">
                        {card.name}
                    </div>
                </div>
            );
        };

        // --- PLAYER AVATAR ---
        const PlayerAvatar = ({ 
            player, myPlayerId, allPlayers, currentPlayerId, isActive, 
            blackCatHolderId, protectionTargetId, isTargetable, onSelect, lastWitchVotes, isMe,
            revealMode, girlTrialMode, playerName
        }) => {
            const hasBlackCat = blackCatHolderId === player.id;
            const isProtected = protectionTargetId === player.id;
            const hasMatchmaker = player.blueCards.some(c => c.name === '情侣');
            const hasAsylum = player.blueCards.some(c => c.name === '避难');
            const hasAlibi = player.blueCards.some(c => c.name === '信徒'); 

            const myPlayer = allPlayers[myPlayerId];
            const amWitch = myPlayer && myPlayer.identityCards.some(c => c.identity === Identity.WITCH);
            const isTeammate = amWitch && player.identityCards.some(c => c.identity === Identity.WITCH) && player.id !== myPlayerId;

            const effectiveRole = getEffectiveRole(player, allPlayers);

            // Compact size for 4-column layout on mobile
            const sizeClass = "w-12 md:w-16"; 
            
            const isRevealTarget = revealMode && isTargetable; 
            const isGirlTarget = girlTrialMode && !player.isDead && player.id !== myPlayerId;

            return (
                <div 
                    onClick={() => (isTargetable || isGirlTarget) && onSelect()} 
                    className={`
                        relative flex flex-col
                        ${sizeClass}
                        transition-all duration-300 
                        rounded-xl border-[3px] select-none overflow-hidden shadow-lg
                        ${player.isDead ? 'opacity-60 grayscale sepia border-stone-700' : 'bg-[#1c1917]'}
                        ${isActive ? 'ring-4 ring-amber-700 scale-105 z-20' : ''}
                        ${(!isRevealTarget && isTargetable) ? 'cursor-pointer ring-4 ring-red-900 animate-pulse scale-105' : ''}
                        ${isRevealTarget ? 'cursor-pointer ring-4 ring-yellow-600 z-30 scale-105' : ''} 
                        ${isGirlTarget ? 'cursor-pointer ring-4 ring-red-700 animate-pulse scale-105' : ''}
                        ${isTeammate ? 'border-purple-900 shadow-[0_0_10px_rgba(107,33,168,0.5)]' : 'border-[#44403c]'}
                        ${isMe ? 'border-amber-800 shadow-[0_0_15px_rgba(180,83,9,0.2)]' : ''}
                    `}
                >
                    {/* Role Title Header */}
                    <div className={`w-full bg-[#292524] text-center py-0.5 text-[#a8a29e] font-bold truncate px-1 border-b border-[#44403c] text-[7px] md:text-[9px] font-serif tracking-wide`}>
                        {effectiveRole.name}
                    </div>

                    {/* Main Avatar Area */}
                    <div className="relative w-full aspect-square bg-[#1c1917] group">
                        <AvatarImage 
                            charId={player.character.id}
                            alt={player.character.name}
                            className="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity"
                        />
                        
                        {/* Role Desc Tooltip */}
                        <div className="absolute inset-0 bg-black/95 text-[#e7e5e4] text-[10px] p-2 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-center z-30 pointer-events-none font-serif border border-[#78350f]">
                            {effectiveRole.desc}
                        </div>
                        
                        {/* Player Name Overlay */}
                        {player.name && (
                             <div className="absolute bottom-0 left-0 right-0 bg-black/70 text-[#e7e5e4] text-[7px] text-center truncate px-1 py-0.5">
                                 {player.name}
                             </div>
                        )}

                        {isTeammate && !player.isDead && (
                            <div className="absolute top-1 left-1/2 -translate-x-1/2 bg-purple-900 text-purple-100 text-[8px] px-1 rounded shadow-sm border border-purple-500">
                                巫
                            </div>
                        )}

                        {!isMe && !player.isDead && (
                            <div className="absolute top-0.5 left-0.5 bg-black/80 rounded px-1 py-0.5 flex items-center gap-0.5 border border-[#44403c] shadow-sm">
                                <div className="w-2 h-3 bg-[#57534e] rounded-[1px] border border-[#a8a29e]"></div>
                                <span className="text-[8px] font-bold text-white">{player.hand.length}</span>
                            </div>
                        )}

                        <div className="absolute top-0.5 right-0.5 flex flex-col gap-0.5 items-end">
                            {hasBlackCat && (
                                <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#2e1065] border border-purple-400 flex items-center justify-center shadow-[0_0_15px_#a855f7] z-20">
                                    <Cat className="w-2 h-2 md:w-2.5 md:h-2.5 text-purple-200" />
                                </div>
                            )}
                            {isProtected && (
                                <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#1e3a8a] border border-blue-300 flex items-center justify-center shadow-md z-20">
                                    <Shield className="w-2 h-2 md:w-2.5 md:h-2.5 text-blue-200" />
                                </div>
                            )}
                            {hasMatchmaker && (
                                <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#831843] border border-pink-300 flex items-center justify-center shadow-md">
                                    <Heart className="w-2 h-2 md:w-2.5 md:h-2.5 text-pink-200" />
                                </div>
                            )}
                            {hasAsylum && (
                                <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#14532d] border border-green-300 flex items-center justify-center shadow-md">
                                    <Home className="w-2 h-2 md:w-2.5 md:h-2.5 text-green-200" />
                                </div>
                            )}
                            {hasAlibi && (
                                <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#134e4a] border border-teal-300 flex items-center justify-center shadow-md">
                                    <Users className="w-2 h-2 md:w-2.5 md:h-2.5 text-teal-200" />
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Accusation Bar */}
                    <div className="w-full min-h-[10px] flex flex-wrap justify-center items-center bg-[#292524] border-t border-b border-[#44403c] px-0.5 py-0.5">
                        {Array.from({ length: player.accusations }).map((_, i) => (
                            <span key={i} className="text-[6px] text-[#dc2626] font-bold leading-none mx-[1px]">✕</span>
                        ))}
                    </div>

                    {/* Identity Cards Row */}
                    <div className="w-full flex justify-center gap-0.5 p-0.5 bg-[#1c1917] border-t border-[#44403c] h-5 items-center">
                        {player.identityCards.map((card, idx) => {
                            const identityLabel = card.identity === Identity.WITCH ? '巫' : card.identity === Identity.CONSTABLE ? '警' : '民';
                            
                            let content = '?';
                            let styleClass = 'bg-[#0c0a09] text-[#57534e] border-[#292524]'; // Default Unknown Dark

                            if (player.id === myPlayerId) {
                                if (card.isRevealed) {
                                    content = '✕';
                                    styleClass = 'bg-[#450a0a] text-red-500 border-red-900'; 
                                } else {
                                    content = identityLabel;
                                    if (card.identity === Identity.WITCH) styleClass = 'bg-[#581c87] text-purple-200 border-purple-900';
                                    else if (card.identity === Identity.CONSTABLE) styleClass = 'bg-[#1e3a8a] text-blue-200 border-blue-900';
                                    else styleClass = 'bg-[#14532d] text-green-200 border-green-900';
                                }
                            } else {
                                if (card.isRevealed) {
                                    content = identityLabel;
                                    if (card.identity === Identity.WITCH) styleClass = 'bg-[#581c87] text-purple-200 border-purple-900';
                                    else if (card.identity === Identity.CONSTABLE) styleClass = 'bg-[#1e3a8a] text-blue-200 border-blue-900';
                                    else styleClass = 'bg-[#14532d] text-green-200 border-green-900';
                                } else {
                                    content = '?';
                                    styleClass = 'bg-[#0c0a09] text-[#57534e] border-[#292524]';
                                }
                            }

                            return (
                                <div 
                                    key={idx}
                                    className={`
                                        w-2.5 h-4 rounded-[1px] border text-[6px] flex items-center justify-center leading-none font-bold font-serif
                                        ${styleClass}
                                    `}
                                >
                                    {content}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const SalemGame = () => {
            // Meta State
            const [view, setView] = useState(View.LANDING);
            const [myDisplayName, setMyDisplayName] = useState(""); // Player Name

            // Network State
            const [peer, setPeer] = useState(null);
            const [roomId, setRoomId] = useState(""); // Host's Peer ID
            const [myPeerId, setMyPeerId] = useState("");
            const [isHost, setIsHost] = useState(false);
            const [connections, setConnections] = useState([]); // For Host: List of connections
            const [connectedPlayers, setConnectedPlayers] = useState([]); // List of { peerId, name, isReady }
            const [hostConn, setHostConn] = useState(null); // For Guest: Connection to Host
            const [isJoining, setIsJoining] = useState(false);

            // Setup State
            const [playerCount, setPlayerCount] = useState(7);
            const [charChoices, setCharChoices] = useState([]);
            const [availablePool, setAvailablePool] = useState([]); // Store characters NOT offered to human
            const [takenCharacters, setTakenCharacters] = useState([]); // List of IDs
            
            // Game State (Synced)
            const [phase, setPhase] = useState(Phase.INITIAL_NIGHT);
            const [players, setPlayers] = useState([]);
            const [deck, setDeck] = useState([]);
            const [discardPile, setDiscardPile] = useState([]);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
            const [myPlayerId, setMyPlayerId] = useState(0);
            const [turnTimer, setTurnTimer] = useState(35);
            
            // Local UI State
            const [selectedCardIds, setSelectedCardIds] = useState([]);
            const [systemMessage, setSystemMessage] = useState(null);
            const [hasPlayedCard, setHasPlayedCard] = useState(false);
            const [trialTargetId, setTrialTargetId] = useState(null); 
            const [identitySelectionTargetId, setIdentitySelectionTargetId] = useState(null);
            const [girlTrialMode, setGirlTrialMode] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [bgmVolume, setBgmVolume] = useState(0.5);
            
            // Night/Voting State
            const [witchVotes, setWitchVotes] = useState({});
            const [witchDisagreementCount, setWitchDisagreementCount] = useState(0);
            const [lastWitchVotes, setLastWitchVotes] = useState(null); 
            const [protectionTargetId, setProtectionTargetId] = useState(null);
            const [visibleProtectionTargetId, setVisibleProtectionTargetId] = useState(null);

            // Derived State
            const blackCatHolderId = players.find(p => p.blueCards.some(c => c.name === '黑猫'))?.id ?? null;

            // Refs
            const toastTimeoutRef = useRef(null);
            const audioRef = useRef(null);

            // --- Toast Logic ---
            const showToast = (msg, duration = 4000) => {
                if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
                setSystemMessage(msg);
                toastTimeoutRef.current = setTimeout(() => setSystemMessage(null), duration);
            };

            // --- Initialization: URL Params ---
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const inviteRoomId = params.get('room');
                if (inviteRoomId) {
                    setRoomId(inviteRoomId);
                    setView(View.JOIN_ROOM);
                    showToast("已自动填入房间号，请输入名字加入");
                }
            }, []);

            // --- Audio Logic ---
            useEffect(() => {
                if(audioRef.current) {
                    audioRef.current.volume = bgmVolume;
                    if (bgmVolume > 0 && audioRef.current.paused) {
                         // Attempt to play automatically, though browsers may block this without interaction
                         const playPromise = audioRef.current.play();
                         if (playPromise !== undefined) {
                             playPromise.catch(error => {
                                 console.log("Autoplay prevented by browser policy. Interaction needed.");
                             });
                         }
                    }
                }
            }, [bgmVolume]);

            // --- Autoplay Fallback Logic ---
            useEffect(() => {
                const unlockAudio = () => {
                    if (audioRef.current && audioRef.current.paused && bgmVolume > 0) {
                        audioRef.current.play().catch(() => {});
                    }
                };
                // Capture first interaction to unlock audio context if autoplay failed
                window.addEventListener('click', unlockAudio, { once: true });
                window.addEventListener('touchstart', unlockAudio, { once: true });
                window.addEventListener('keydown', unlockAudio, { once: true });

                return () => {
                    window.removeEventListener('click', unlockAudio);
                    window.removeEventListener('touchstart', unlockAudio);
                    window.removeEventListener('keydown', unlockAudio);
                };
            }, [bgmVolume]);

            // --- Networking Logic ---

            // Initialize Peer on Lobby Entrance or demand
            const initPeer = () => {
                if (peer) return peer;
                const newPeer = new window.Peer(null, { debug: 2 });
                newPeer.on('open', (id) => {
                    setMyPeerId(id);
                });
                newPeer.on('error', (err) => {
                    console.error("Peer Error:", err);
                    showToast("网络连接错误: " + err.type);
                });
                setPeer(newPeer);
                return newPeer;
            };

            const hostRoom = () => {
                if (!myDisplayName.trim()) { showToast("请输入你的名字"); return; }
                const p = initPeer();
                setIsHost(true);
                setConnections([]); // Clear previous connections

                const onOpen = (id) => {
                    setRoomId(id);
                    setConnectedPlayers([{ peerId: id, name: myDisplayName, isReady: true, isHost: true }]);
                    setView(View.WAITING_ROOM);
                };

                if (p.open) {
                    onOpen(p.id);
                } else {
                    p.on('open', onOpen);
                }
                
                // Ensure we don't have duplicate listeners if peer is reused
                p.off('connection');
                p.on('connection', (conn) => {
                    conn.on('data', (data) => handleHostData(data, conn));
                    conn.on('open', () => {
                         setConnections(prev => [...prev, conn]);
                    });
                });
            };

            const joinRoom = () => {
                if (!myDisplayName.trim()) { showToast("请输入你的名字"); return; }
                if (!roomId.trim()) { showToast("请输入房间号"); return; }
                
                setIsJoining(true);
                showToast("正在尝试连接...", 2000);

                const p = initPeer();
                setIsHost(false);

                // Timeout handler
                const connectionTimeout = setTimeout(() => {
                    if (isJoining) {
                        setIsJoining(false);
                        showToast("连接超时。请检查房间号或网络状况 (建议在同WiFi下尝试)", 5000);
                    }
                }, 10000);
                
                const connect = () => {
                    if (hostConn) hostConn.close();

                    const conn = p.connect(roomId, { reliable: true });
                    conn.on('open', () => {
                        clearTimeout(connectionTimeout);
                        setIsJoining(false);
                        setHostConn(conn);
                        conn.send({ type: 'JOIN', name: myDisplayName });
                        setView(View.WAITING_ROOM);
                        showToast("成功加入房间!");
                    });
                    conn.on('data', (data) => handleGuestData(data));
                    conn.on('close', () => { 
                        showToast("与房主断开连接"); 
                        setView(View.LANDING); 
                        setHostConn(null);
                    });
                    conn.on('error', (err) => { 
                         clearTimeout(connectionTimeout);
                         setIsJoining(false);
                         showToast("连接失败: " + err); 
                    });
                };

                if (p.open) {
                    connect();
                } else {
                    p.once('open', connect);
                    p.on('error', (err) => {
                        clearTimeout(connectionTimeout);
                        setIsJoining(false);
                        showToast("Peer初始化失败: " + err.type);
                    });
                }
            };

            // HOST: Handle incoming data
            const handleHostData = (data, conn) => {
                switch(data.type) {
                    case 'JOIN':
                        const newPlayer = { peerId: conn.peer, name: data.name, isReady: false, isHost: false };
                        setConnectedPlayers(prev => {
                            const updated = [...prev, newPlayer];
                            broadcastToAll(connections, { type: 'ROOM_UPDATE', players: updated });
                            return updated;
                        });
                        break;
                    case 'READY_TOGGLE':
                        setConnectedPlayers(prev => {
                            const updated = prev.map(p => p.peerId === conn.peer ? { ...p, isReady: data.isReady } : p);
                            broadcastToAll(connections, { type: 'ROOM_UPDATE', players: updated });
                            return updated;
                        });
                        break;
                    case 'GAME_ACTION':
                        console.log("Host received action:", data.action);
                        break;
                    case 'CHAR_SELECT':
                        if (takenCharacters.includes(data.charId)) {
                             conn.send({ type: 'ERROR', msg: '该角色已被选择' });
                        } else {
                             setTakenCharacters(prev => [...prev, data.charId]);
                             broadcastToAll(connections, { type: 'TAKEN_CHARS_UPDATE', taken: [...takenCharacters, data.charId] });
                        }
                        break;
                }
            };

            // GUEST: Handle incoming data
            const handleGuestData = (data) => {
                switch(data.type) {
                    case 'ROOM_UPDATE':
                        setConnectedPlayers(data.players);
                        break;
                    case 'START_GAME_SETUP':
                        setPlayerCount(data.playerCount);
                        setView(View.CHAR_SELECT);
                        break;
                    case 'GAME_STATE_UPDATE':
                        if(data.state.players) setPlayers(data.state.players);
                        if(data.state.phase) setPhase(data.state.phase);
                        break;
                    case 'TAKEN_CHARS_UPDATE':
                        setTakenCharacters(data.taken);
                        break;
                }
            };

            const broadcastToAll = (conns, msg) => {
                conns.forEach(c => {
                    if(c.open) c.send(msg);
                });
            };

            // --- Initialization Logic ---
            const startSetupHost = () => {
                setView(View.SETUP_HOST);
            };

            const launchGameSetup = () => {
                if (isHost) {
                    broadcastToAll(connections, { type: 'START_GAME_SETUP', playerCount });
                    setView(View.CHAR_SELECT);
                }
            };

            const confirmSetup = () => {
                const shuffled = shuffle([...CHARACTERS]);
                let choices = [];
                const available = shuffled.filter(c => !takenCharacters.includes(c.id));

                if (playerCount < 7) {
                    choices = available.slice(0, 2);
                } else {
                    choices = available.slice(0, 1);
                }
                
                setCharChoices(choices);
                setView(View.CHAR_SELECT);
            };

            const getDeckComposition = (count) => {
                let villagers, witches, constable = 1;
                if (count >= 4 && count <= 7) {
                     witches = count >= 6 ? 2 : 1;
                     villagers = (count * 5) - witches - constable;
                } else if (count === 8) { villagers = 29; witches = 2; }
                else if (count === 9) { villagers = 33; witches = 2; }
                else if (count === 10) { villagers = 27; witches = 2; }
                else if (count === 11) { villagers = 30; witches = 2; }
                else if (count === 12) { villagers = 33; witches = 2; }
                
                const total = villagers + witches + constable;
                return { villagers, witches, constable, total, cardsPerPlayer: Math.floor(total / count) };
            };

            const initGame = (chosenCharId) => {
                if (!isHost && hostConn) {
                    hostConn.send({ type: 'CHAR_SELECT', charId: chosenCharId });
                }
                setTakenCharacters(prev => [...prev, chosenCharId]);

                const comp = getDeckComposition(playerCount);
                let identityDeck = [];
                for (let i = 0; i < comp.constable; i++) identityDeck.push({ identity: Identity.CONSTABLE, isRevealed: false });
                for (let i = 0; i < comp.witches; i++) identityDeck.push({ identity: Identity.WITCH, isRevealed: false });
                for (let i = 0; i < comp.villagers; i++) identityDeck.push({ identity: Identity.VILLAGER, isRevealed: false });
                identityDeck = shuffle(identityDeck);

                let availableChars = CHARACTERS.filter(c => c.id !== chosenCharId && !takenCharacters.includes(c.id));
                availableChars = shuffle(availableChars);
                
                const newPlayers = [];
                const humanChar = CHARACTERS.find(c => c.id === chosenCharId);

                for (let i = 0; i < playerCount; i++) {
                    const char = i === 0 ? humanChar : availableChars.pop();
                    const idCards = identityDeck.splice(0, comp.cardsPerPlayer);
                    
                    newPlayers.push({
                        id: i,
                        name: i === 0 ? myDisplayName : (i < connectedPlayers.length ? connectedPlayers[i].name : `电脑 ${i}`),
                        isHuman: i === 0 || (isHost && i < connectedPlayers.length), 
                        character: char,
                        hand: [],
                        blueCards: [],
                        identityCards: idCards,
                        accusations: 0,
                        isDead: false,
                        priestUsedCount: 0,
                        storytellerUsed: false,
                        officialSkillUsed: false 
                    });
                }

                const fullDeck = generateDeck();
                const blackCards = fullDeck.filter(c => c.type === CardType.BLACK);
                let playDeck = fullDeck.filter(c => c.type !== CardType.BLACK && c.name !== '黑猫');
                playDeck = shuffle(playDeck);

                newPlayers.forEach(p => {
                    for(let k=0; k<3; k++) {
                        if (playDeck.length > 0) p.hand.push(playDeck.pop());
                    }
                });

                const conspiracy = blackCards.find(c => c.name === '传染');
                const night = blackCards.find(c => c.name === '黑夜');
                
                if (conspiracy) playDeck.push(conspiracy);
                playDeck = shuffle(playDeck);
                
                if (night) playDeck.unshift(night); 

                setPlayers(newPlayers);
                setDeck(playDeck);
                setPhase(Phase.INITIAL_NIGHT);
                setMyPlayerId(0);
                setCurrentPlayerIndex(0); 
                setWitchVotes({});
                setView(View.GAME);
                
                const myIdentities = newPlayers[0].identityCards;
                const isWitch = myIdentities.some(c => c.identity === Identity.WITCH);
                if (isWitch) showToast('天黑了... 你是女巫! 请放置黑猫。', 5000);
                else if (myIdentities.some(c => c.identity === Identity.CONSTABLE)) showToast('天黑了... 你是警长! 女巫正在行动。', 5000);
                else showToast('天黑了... 你是平民。女巫正在行动。', 5000);
            };

            // --- Helper for Girl Skill ---
            const getHandAccusationTotal = (hand, isDoctor) => {
                let total = 0;
                hand.forEach(c => {
                    if (c.name === '目击') total += 7;
                    else if (c.name === '证据') total += 3;
                    else if (c.name === '指控') total += 1;
                    else if (c.name === '辩护' && isDoctor) total += 7;
                });
                return total;
            };

            // --- Main Loop Effects ---
            useEffect(() => {
                if (view !== View.GAME) return;
                
                if (phase !== Phase.DAY_TURN) return;
                if (!players || players.length === 0) return; 
                const timer = setInterval(() => {
                    setTurnTimer(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            handleTurnTimeout();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [phase, currentPlayerIndex, players, view]);

            const handleTurnTimeout = () => {
                if (players.length === 0) return;
                const currentPlayer = players[currentPlayerIndex];
                if (!currentPlayer) return;

                if (currentPlayer.hand.some(c => c.type === CardType.BLACK)) {
                    const blackCard = currentPlayer.hand.find(c => c.type === CardType.BLACK);
                    handlePlayCard(blackCard);
                } else {
                    handleDrawCards(2, false, true); 
                }
            };
            
            useEffect(() => {
                if (view !== View.GAME) return;
                if (phase === Phase.GAME_OVER) return;
                if (!players || players.length === 0) return; 
                
                const currentPlayer = players[currentPlayerIndex];
                if (!currentPlayer && phase !== Phase.INITIAL_NIGHT) return; 
                
                if (phase === Phase.DAY_TURN && currentPlayer && currentPlayer.isDead) {
                     const newPlayers = [...players];
                     endTurn(newPlayers);
                     return;
                }

                if (phase === Phase.INITIAL_NIGHT) {
                    const humanWitch = players[0].identityCards.some(c => c.identity === Identity.WITCH);
                    const witchPlayers = players.filter(p => p.identityCards.some(c => c.identity === Identity.WITCH));
                    const aiWitches = witchPlayers.filter(p => !p.isHuman);
                    
                    aiWitches.forEach(ai => {
                         if (!witchVotes[ai.id]) {
                             let validTargets = players.map(p => p.id).filter(id => getEffectiveRole(players[id], players).id !== 'maid');
                             const choice = validTargets[Math.floor(Math.random() * validTargets.length)];
                             setTimeout(() => {
                                 castWitchVote(ai.id, choice);
                             }, Math.random() * 2000 + 1000);
                         }
                    });

                    if (!humanWitch) {
                         const allAiVoted = aiWitches.every(w => witchVotes[w.id] !== undefined);
                         if (allAiVoted) {
                              checkWitchConsensus();
                         }
                    }
                    return;
                }

                if (phase === Phase.DAY_TURN && !currentPlayer.isHuman) {
                    const timer = setTimeout(() => {
                        if (phase !== Phase.DAY_TURN || currentPlayerIndex !== currentPlayer.id) return;

                        const cp = players[currentPlayerIndex];
                        const newPlayers = [...players];
                        const p = newPlayers[currentPlayerIndex];

                        const blackCard = p.hand.find(c => c.type === CardType.BLACK);
                        if (blackCard) {
                            handlePlayCard(blackCard);
                            return;
                        }

                        let attackCards = p.hand.filter(c => ['证据', '目击', '指控'].includes(c.name));
                        
                        const effectiveRole = getEffectiveRole(p, newPlayers);
                        if (effectiveRole.id === 'doctor') {
                             const defenseCards = p.hand.filter(c => c.name === '辩护');
                             attackCards = [...attackCards, ...defenseCards];
                        }

                        if (attackCards.length > 0 && !hasPlayedCard) {
                            const cardToPlay = attackCards[Math.floor(Math.random() * attackCards.length)];
                            const validTargets = newPlayers.filter(target => !target.isDead && target.id !== p.id);
                            
                            if (validTargets.length > 0) {
                                const target = validTargets[Math.floor(Math.random() * validTargets.length)];
                                let amount = 1;
                                if (cardToPlay.name === '目击') amount = 7;
                                else if (cardToPlay.name === '证据') amount = 3;
                                else if (cardToPlay.name === '辩护' && effectiveRole.id === 'doctor') amount = 7;

                                const targetRole = getEffectiveRole(target, newPlayers);
                                if (targetRole.id === 'minister' && cardToPlay.name === '证据') amount = 1;

                                const asylum = target.blueCards.find(c => c.name === '避难');
                                if (!asylum) {
                                    target.accusations += amount;
                                    
                                    let threshold = 7;
                                    if (effectiveRole.id === 'judge') threshold = 6;
                                    if (targetRole.id === 'strongman') threshold = 8;

                                    const cardIndex = p.hand.findIndex(c => c.id === cardToPlay.id);
                                    if (cardIndex > -1) p.hand.splice(cardIndex, 1);
                                    setDiscardPile(prev => [...prev, cardToPlay]);
                                    
                                    if (target.accusations >= threshold) {
                                        setPlayers(newPlayers);
                                        showToast(`${p.character.name} 对 ${target.character.name} 使用了 ${cardToPlay.name}, 发起审判!`);
                                        setTimeout(() => {
                                            initiateTrial(target.id);
                                        }, 1000);
                                    } else {
                                        setPlayers(newPlayers);
                                        showToast(`${p.character.name} 对 ${target.character.name} 使用了 ${cardToPlay.name}`);
                                        endTurn(newPlayers);
                                    }
                                } else {
                                     const cardIndex = p.hand.findIndex(c => c.id === cardToPlay.id);
                                     if (cardIndex > -1) p.hand.splice(cardIndex, 1);
                                     setDiscardPile(prev => [...prev, cardToPlay]);
                                     setPlayers(newPlayers);
                                     showToast(`${target.character.name} 拥有避难所!`);
                                     endTurn(newPlayers);
                                }
                                return;
                            }
                        }
                        handleDrawCards(2, false, true);

                    }, 1500); 
                    return () => clearTimeout(timer);
                }

                if (phase === Phase.NIGHT_WITCH) {
                    const humanIsWitch = players[0].identityCards.some(c => c.identity === Identity.WITCH);
                    if (!humanIsWitch) {
                        const timer = setTimeout(() => {
                           const target = Math.floor(Math.random() * players.length);
                           setLastWitchVotes({[99]: target}); 
                           handleNightAction('WITCH', target); 
                        }, 2500);
                        return () => clearTimeout(timer);
                    }
                }

                if (phase === Phase.NIGHT_CONSTABLE) {
                     const humanIsConstable = players[0].identityCards.some(c => c.identity === Identity.CONSTABLE && !c.isRevealed);
                     if (!humanIsConstable) {
                         const timer = setTimeout(() => {
                             const target = Math.floor(Math.random() * players.length);
                             handleNightAction('CONSTABLE', target); 
                         }, 2500);
                         return () => clearTimeout(timer);
                     }
                }
                
                if (phase === Phase.TRIAL_REVEAL && !currentPlayer.isHuman) {
                    const timer = setTimeout(() => {
                        const target = players[trialTargetId];
                        if (!target) { setPhase(Phase.DAY_TURN); return; }
                        const unrevealed = target.identityCards.map((c, i) => (!c.isRevealed ? i : -1)).filter(i => i !== -1);
                        if (unrevealed.length > 0) {
                            const randomIdx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
                            handleIdentityCardClick(trialTargetId, randomIdx);
                        } else {
                            setPhase(Phase.DAY_TURN);
                        }
                    }, 2000);
                    return () => clearTimeout(timer);
                }
                
                if (phase === Phase.RESOLVE_CONSPIRACY_REVEAL && !currentPlayer.isHuman) {
                    const timer = setTimeout(() => {
                        if (!players[blackCatHolderId] || players[blackCatHolderId].isDead) {
                             setPhase(Phase.RESOLVE_CONSPIRACY_ROTATION);
                             return;
                        }
                        const holder = players[blackCatHolderId];
                        const unrevealed = holder.identityCards.map((c, i) => (!c.isRevealed ? i : -1)).filter(i => i !== -1);
                        if (unrevealed.length > 0) {
                            const choice = unrevealed[Math.floor(Math.random() * unrevealed.length)];
                            handleIdentityCardClick(blackCatHolderId, choice);
                        } else {
                            setPhase(Phase.RESOLVE_CONSPIRACY_ROTATION);
                        }
                    }, 2000);
                    return () => clearTimeout(timer);
                }

            }, [phase, currentPlayerIndex, players, turnTimer, hasPlayedCard, blackCatHolderId, view, witchVotes, trialTargetId]);

            const finishAiCardPlay = (card) => {
                const newPlayers = [...players];
                const cp = newPlayers[currentPlayerIndex];
                const cardIndex = cp.hand.findIndex(c => c.id === card.id);
                if (cardIndex > -1) {
                    cp.hand.splice(cardIndex, 1);
                }
                const newDiscard = [...discardPile, card];
                setPlayers(newPlayers);
                setDiscardPile(newDiscard);
                endTurn(newPlayers);
            };

            // --- Actions ---
            
            const castWitchVote = (voterId, targetId) => {
                setWitchVotes(prev => {
                    const newVotes = {...prev, [voterId]: targetId};
                    const witchPlayers = players.filter(p => p.identityCards.some(c => c.identity === Identity.WITCH));
                    if (Object.keys(newVotes).length === witchPlayers.length) {
                    }
                    return newVotes;
                });
            };

            const checkWitchConsensus = () => {
                const witchPlayers = players.filter(p => p.identityCards.some(c => c.identity === Identity.WITCH));
                const currentVotes = witchVotes;
                
                if (Object.keys(currentVotes).length < witchPlayers.length) return;

                const targets = Object.values(currentVotes);
                const firstTarget = targets[0];
                const isConsensus = targets.every(t => t === firstTarget);

                if (isConsensus) {
                    handleInitialBlackCatPlacement(firstTarget);
                } else {
                    showToast("意见不统一！请统一把黑猫放在一位玩家身上。", 4000);
                    setWitchVotes({});
                }
            };

            useEffect(() => {
                if (phase === Phase.INITIAL_NIGHT) {
                    const witchPlayers = players.filter(p => p.identityCards.some(c => c.identity === Identity.WITCH));
                    if (players.length > 0 && witchPlayers.length > 0 && Object.keys(witchVotes).length === witchPlayers.length) {
                        checkWitchConsensus();
                    }
                }
            }, [witchVotes]);


            const handleInitialBlackCatPlacement = (targetId) => {
                if (getEffectiveRole(players[targetId], players).id === 'maid') {
                    showToast("女仆免疫黑猫！");
                    setWitchVotes({});
                    return;
                }
                
                const blackCatCard = { id: `card-blackcat-special`, name: '黑猫', type: CardType.BLUE, icon: Cat, desc: '先手行动' };
                const newPlayers = [...players];
                newPlayers[targetId].blueCards.push(blackCatCard);
                setPlayers(newPlayers);

                setSystemMessage(`黑猫被放置在 ${players[targetId].character.name} 身上`);
                setTimeout(() => {
                    setCurrentPlayerIndex(targetId);
                    setPhase(Phase.DAY_TURN);
                    setTurnTimer(35);
                    showToast("天亮了！拥有黑猫的玩家先行动");
                }, 2000);
            };

            const handlePlayCard = (card) => {
                if (card.name === '黑夜') {
                    const hasConspiracy = players[currentPlayerIndex].hand.some(c => c.name === '传染');
                    if (hasConspiracy) {
                        showToast("必须先打出 [传染] !");
                        return;
                    }
                }

                if (card.type === CardType.BLACK) {
                    const newPlayers = [...players];
                    const pIndex = newPlayers.findIndex(p => p.id === currentPlayerIndex);
                    newPlayers[pIndex].hand = newPlayers[pIndex].hand.filter(c => c.id !== card.id);
                    setPlayers(newPlayers);
                    setDiscardPile([...discardPile, card]);

                    if (card.name === '传染') {
                        handleConspiracyStart();
                    } else if (card.name === '黑夜') {
                         setSystemMessage('天黑了...');
                         startNightPhase();
                    }
                } else {
                    if (selectedCardIds.includes(card.id)) {
                        setSelectedCardIds([]);
                    } else {
                        const p = players[myPlayerId];
                        const effectiveRole = getEffectiveRole(p, players);
                        if (card.name === '辩护' && effectiveRole.id === 'doctor') {
                             setSelectedCardIds([card.id]);
                             showToast("医生技能：可将辩护作为目击使用");
                        } else {
                             setSelectedCardIds([card.id]);
                        }
                    }
                }
            };

            const handleGirlTrialStart = () => {
                handleDrawCards(2, false, false);
                setGirlTrialMode(true);
                showToast("少女技能：已奖励摸牌，请选择你要审判的玩家");
            };

            const handleTargetClick = (targetId) => {
                if (girlTrialMode) {
                    const me = players[myPlayerId];
                    const target = players[targetId];
                    
                    const hand = [...me.hand];
                    const needed = 7;
                    let currentSum = 0;
                    let toDiscard = [];
                    
                    const witnesses = hand.filter(c => c.name === '目击');
                    const evidences = hand.filter(c => c.name === '证据');
                    const accusations = hand.filter(c => c.name === '指控');
                    
                    if (witnesses.length > 0) {
                        toDiscard.push(witnesses[0]);
                        currentSum = 7;
                    } else {
                        while (currentSum < needed && evidences.length > 0) {
                            toDiscard.push(evidences.pop());
                            currentSum += 3;
                        }
                        while (currentSum < needed && accusations.length > 0) {
                            toDiscard.push(accusations.pop());
                            currentSum += 1;
                        }
                    }
                    
                    if (currentSum < needed) {
                        showToast("计算错误，手牌不足以发起审判 (Bug check)");
                        setGirlTrialMode(false);
                        return;
                    }
                    
                    const newPlayers = [...players];
                    const p = newPlayers[myPlayerId];
                    const t = newPlayers[targetId];
                    const discardIds = toDiscard.map(c => c.id);
                    p.hand = p.hand.filter(c => !discardIds.includes(c.id));
                    
                    t.accusations += currentSum; 
                    setDiscardPile(prev => [...prev, ...toDiscard]);
                    setPlayers(newPlayers);
                    setGirlTrialMode(false);
                    
                    initiateTrial(targetId);
                    return;
                }

                if (phase === Phase.INITIAL_NIGHT) {
                    const amWitch = players[0].identityCards.some(c => c.identity === Identity.WITCH);
                    if (amWitch) {
                        castWitchVote(myPlayerId, targetId);
                        return;
                    }
                }

                const cardsToPlay = players[myPlayerId].hand.filter(c => selectedCardIds.includes(c.id));
                if (cardsToPlay.length === 0) return;

                cardsToPlay.forEach(card => executeCardEffect(card, [targetId]));
                
                const newPlayers = [...players];
                newPlayers[myPlayerId].hand = newPlayers[myPlayerId].hand.filter(c => !selectedCardIds.includes(c.id));
                setPlayers(newPlayers);
                setDiscardPile([...discardPile, ...cardsToPlay]);
                setSelectedCardIds([]);
                setHasPlayedCard(true);
            };

            const executeCardEffect = (card, targetIds) => {
                const targetId = targetIds[0];
                const newPlayers = [...players];
                const target = newPlayers[targetId];
                const source = newPlayers[currentPlayerIndex];
                const sourceRole = getEffectiveRole(source, newPlayers);
                const targetRole = getEffectiveRole(target, newPlayers);
                
                if (targetRole.id === 'beggar' && (card.name === '抢劫' || card.name === '纵火')) {
                    showToast("乞丐免疫此效果！");
                    return; 
                }

                if (targetRole.id === 'maid' && card.name === '情侣') {
                    showToast("女仆免疫情侣效果！");
                    return;
                }

                const isDoctorAttack = card.name === '辩护' && sourceRole.id === 'doctor';

                if (card.type === CardType.RED || isDoctorAttack) {
                    let amount = 1;
                    if (card.name === '目击' || isDoctorAttack) amount = 7;
                    else if (card.name === '证据') amount = 3;

                    if (targetRole.id === 'minister' && card.name === '证据') {
                        amount = 1;
                        showToast("部长技能：证据仅算作1指控");
                    }

                    const asylum = target.blueCards.find(c => c.name === '避难');
                    if (!asylum) {
                        target.accusations += amount;
                        
                        let threshold = 7;
                        if (sourceRole.id === 'judge') threshold = 6;
                        if (targetRole.id === 'strongman') threshold = 8;

                        if (target.accusations >= threshold) {
                            initiateTrial(targetId); 
                        }
                    } else {
                         showToast(`${target.character.name} 拥有避难所!`);
                    }
                } else if (card.type === CardType.BLUE) {
                    target.blueCards.push(card);
                } else if (card.name === '抢劫') {
                    if (target.hand.length > 0) {
                         const stolen = target.hand.pop();
                         source.hand.push(stolen);
                         showToast(`抢到了 ${stolen.name}`);
                    }
                } else if (card.name === '纵火') {
                     target.hand = [];
                     showToast("手牌已清空");
                }
                setPlayers(newPlayers);
            };
            
            const initiateTrial = (targetId) => {
                const source = players[currentPlayerIndex];
                const victim = players[targetId];
                const unrevealed = victim.identityCards.filter(c => !c.isRevealed);
                if (unrevealed.length === 0) return;
                
                setTrialTargetId(targetId);
                setPhase(Phase.TRIAL_REVEAL);

                if (source.isHuman) {
                    showToast(`审判开始！请点击 ${victim.character.name} 进行翻牌`, 6000);
                } else {
                    showToast(`${source.character.name} 发起了审判...`);
                }
            };

            const handleIdentityCardClick = (targetId, cardIndex) => {
                 const target = players[targetId];
                 if (!target) return;
                 
                 const isTrial = phase === Phase.TRIAL_REVEAL && trialTargetId === targetId;
                 const isConspiracy = phase === Phase.RESOLVE_CONSPIRACY_REVEAL && blackCatHolderId === targetId;
                 
                 if (!isTrial && !isConspiracy) return;

                 const card = target.identityCards[cardIndex];
                 if (card.isRevealed) return;

                 revealIdentity(targetId, card);

                 if (isTrial) {
                     const newPlayers = [...players]; 
                     const p = newPlayers[targetId];
                     
                     if (!p.isDead) {
                         const source = newPlayers[currentPlayerIndex];
                         const sourceRole = getEffectiveRole(source, newPlayers);
                         
                         p.accusations = 0;
                         if (sourceRole.id === 'child') {
                             source.accusations = 0;
                             showToast("小孩技能：清空自身指控");
                         }
                         setPlayers(newPlayers);
                         setPhase(Phase.DAY_TURN); 
                     } else {
                         setPhase(Phase.DAY_TURN); 
                     }
                 } else if (isConspiracy) {
                     setPhase(Phase.RESOLVE_CONSPIRACY_ROTATION);
                 }
            };

            const revealIdentity = (playerId, card) => {
                const newPlayers = [...players];
                const p = newPlayers[playerId];
                const cIndex = p.identityCards.indexOf(card);
                if (cIndex !== -1) {
                    p.identityCards[cIndex].isRevealed = true;
                    
                    const identityName = card.identity === Identity.WITCH ? '女巫' : card.identity === Identity.CONSTABLE ? '警长' : '平民';
                    const msg = `角色 ${p.character.name} 刚刚被翻开的身份是：${identityName}`;
                    showToast(msg, 5000);
                    
                    const allRevealed = p.identityCards.every(c => c.isRevealed);
                    const witchRevealed = card.identity === Identity.WITCH;
                    const willDie = allRevealed || witchRevealed;

                    if (willDie) {
                        p.isDead = true;
                        setTimeout(() => handlePlayerDeath(playerId), 1000);
                    } else {
                        const housewives = newPlayers.filter(hp => !hp.isDead && hp.id !== playerId && getEffectiveRole(hp, newPlayers).id === 'housewife');
                        
                        if (housewives.length > 0) {
                            const currentDeck = [...deck];
                            let drawnCount = 0;
                            housewives.forEach(hp => {
                                if (currentDeck.length > 0) {
                                    hp.hand.push(currentDeck.pop());
                                    drawnCount++;
                                    showToast(`家庭主妇 ${hp.character.name} 获得一张手牌`);
                                }
                            });
                            if (drawnCount > 0) setDeck(currentDeck);
                        }
                    }
                }
                setPlayers(newPlayers);
            };

            const handlePlayerDeath = (pid) => {
                const p = players[pid];
                if(!p) return;
                
                showToast(`${p.character.name} 已死亡!`, 4000);
                const newPlayers = [...players];
                const deadP = newPlayers[pid];
                
                const farmers = newPlayers.filter(p => !p.isDead && getEffectiveRole(p, newPlayers).id === 'farmer');
                if (farmers.length > 0) {
                    const farmer = farmers[0];
                    farmer.hand = [...farmer.hand, ...deadP.hand];
                    farmer.blueCards = [...farmer.blueCards, ...deadP.blueCards];
                    showToast(`农民发动了技能：继承了遗物`);
                } else {
                    setDiscardPile(prev => [...prev, ...deadP.hand, ...deadP.blueCards]);
                }
                
                deadP.hand = [];
                deadP.blueCards = [];
                setPlayers(newPlayers);
            };

            const handlePriestDraw = (isAI = false) => {
                const newPlayers = [...players];
                const p = newPlayers[currentPlayerIndex];
                
                if (!isAI && discardPile.length < 2) { showToast("弃牌堆不足"); return; }
                
                let picked = [];
                let newDiscard = [...discardPile];
                
                const validIndices = newDiscard.map((c, i) => c.type !== CardType.BLACK ? i : -1).filter(i => i !== -1);
                
                if (validIndices.length >= 2) {
                    const idx1 = validIndices[validIndices.length - 1];
                    const idx2 = validIndices[validIndices.length - 2];
                    const c1 = newDiscard.splice(idx1, 1)[0];
                    const c2 = newDiscard.splice(idx2, 1)[0];
                    picked = [c1, c2];
                } else {
                    handleDrawCards(2, false, true);
                    return;
                }
                
                p.hand = [...p.hand, ...picked];
                p.priestUsedCount = (p.priestUsedCount || 0) + 1;
                
                setDiscardPile(newDiscard);
                setPlayers(newPlayers);
                showToast("牧师技能：从弃牌堆回收2张牌");
                endTurn(newPlayers);
            };

            const handleDrawCards = (forceCount = 2, useDiscard = false, endTurnAfter = true) => {
                const newPlayers = [...players];
                const p = newPlayers[currentPlayerIndex];
                const role = getEffectiveRole(p, newPlayers);

                const drawn = [];
                let currentDeck = useDiscard ? [...discardPile] : [...deck];
                let currentDiscard = useDiscard ? [] : [...discardPile];
                
                for(let i=0; i<forceCount; i++) {
                    if (currentDeck.length === 0) {
                         if (currentDiscard.length === 0) break;
                         currentDeck = shuffle(currentDiscard);
                         currentDiscard = [];
                    }
                    drawn.push(currentDeck.pop());
                }
                
                if (role.id === 'landlord' && forceCount === 2) {
                    const accusationCount = drawn.filter(c => c.name === '指控' || c.type === CardType.RED).length;
                    if (accusationCount >= 2) {
                         if (currentDeck.length > 0) {
                             drawn.push(currentDeck.pop());
                             showToast("地主发动了技能：额外获得一张牌");
                         }
                    }
                }

                if (useDiscard) {
                    setDiscardPile(currentDeck); 
                } else {
                    setDeck(currentDeck);
                    setDiscardPile(currentDiscard);
                }
                
                p.hand = [...p.hand, ...drawn];
                setPlayers(newPlayers);
                
                const blackCards = drawn.filter(c => c.type === CardType.BLACK);
                if (blackCards.length > 0) {
                    showToast("你摸到了黑卡! 必须立即打出。");
                } else if (endTurnAfter) {
                    endTurn(newPlayers);
                }
            };

            const endTurn = (currentPlayersState) => {
                const currentP = currentPlayersState[currentPlayerIndex];
                if (currentP.hand.some(c => c.type === CardType.BLACK)) return;

                setHasPlayedCard(false);
                setTurnTimer(35);
                setGirlTrialMode(false); 
                
                let nextIndex = (currentPlayerIndex + 1) % currentPlayersState.length;
                while(currentPlayersState[nextIndex].isDead) {
                    nextIndex = (nextIndex + 1) % currentPlayersState.length;
                }
                setCurrentPlayerIndex(nextIndex);
            };

            // --- Conspiracy Logic ---
            const handleConspiracyStart = () => {
                setSystemMessage('传染生效！请点击黑猫玩家头像，选择翻开一张身份牌');
                if (!players[blackCatHolderId] || players[blackCatHolderId].isDead) {
                    setPhase(Phase.RESOLVE_CONSPIRACY_ROTATION);
                } else {
                    const currentPlayer = players[currentPlayerIndex];
                    if (currentPlayer.isHuman) {
                        showToast(`请点击 ${players[blackCatHolderId].character.name} 选择并翻开一张身份牌`, 5000);
                    }
                    setPhase(Phase.RESOLVE_CONSPIRACY_REVEAL);
                }
            };

            const handleConspiracyInteraction = (targetId) => {
                if (phase === Phase.RESOLVE_CONSPIRACY_ROTATION) {
                    performRotation();
                }
            };
            
            const performRotation = () => {
                const newPlayers = [...players];
                const moves = []; 
                
                newPlayers.forEach(p => {
                     if (p.isDead) return;
                     let leftId = getLivingLeftNeighbor(p.id, newPlayers);
                     const neighbor = newPlayers[leftId];
                     const unrevealed = neighbor.identityCards.filter(c => !c.isRevealed);
                     if (unrevealed.length > 0) {
                         const cardToSteal = unrevealed[Math.floor(Math.random() * unrevealed.length)]; 
                         moves.push({ to: p.id, from: leftId, card: cardToSteal });
                     }
                });
                
                moves.forEach(m => {
                    const fromP = newPlayers[m.from];
                    const toP = newPlayers[m.to];
                    const cIdx = fromP.identityCards.indexOf(m.card);
                    if (cIdx > -1) fromP.identityCards.splice(cIdx, 1);
                    toP.identityCards.push(m.card);
                });
                
                setPlayers(newPlayers);
                setPhase(Phase.RESOLVE_CONSPIRACY_COMPLETED);
