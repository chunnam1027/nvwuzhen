                setTimeout(() => {
                     const p = newPlayers[currentPlayerIndex];
                     const blackNight = p.hand.find(c => c.name === '黑夜');
                     if (blackNight) {
                         handlePlayCard(blackNight);
                     } else {
                         endTurn(newPlayers);
                     }
                }, 3000);
            };

            // --- Night Logic ---
            const startNightPhase = () => {
                setPhase(Phase.NIGHT_WITCH);
                setWitchDisagreementCount(0);
                setLastWitchVotes({});
                showToast("天黑请闭眼...");
            };
            
            const handleWitchPlayerVote = (targetId) => {
                setLastWitchVotes({ [myPlayerId]: targetId });
                if (witchDisagreementCount === 0) {
                    setWitchDisagreementCount(1);
                    showToast("女巫意见不统一! 请重新选择。");
                } else {
                    handleNightAction('WITCH', targetId);
                }
            };

            const handleNightAction = (role, targetId) => {
                if (role === 'WITCH') {
                    setPhase(Phase.NIGHT_CONSTABLE);
                } else if (role === 'CONSTABLE') {
                    setProtectionTargetId(targetId);
                    setVisibleProtectionTargetId(targetId); 
                    
                    setPhase(Phase.DAWN_PRE_ANNOUNCE);
                    setSystemMessage(`昨晚，警长保护了 ${targetId !== null ? players[targetId].character.name : '没人'}.`);
                    setTimeout(() => setPhase(Phase.DAWN_CONFESSION), 4000);
                }
            };

            const resolveDawn = (userConfessed, isOfficialSecret = false) => {
                const newPlayers = [...players];
                let witchTargetId = null;
                if (lastWitchVotes && Object.values(lastWitchVotes).length > 0) {
                    witchTargetId = parseInt(Object.values(lastWitchVotes)[0]);
                }
                
                const me = newPlayers[myPlayerId];

                if (isOfficialSecret) {
                    me.officialSkillUsed = true;
                    showToast("官员使用了特权：自首不翻牌！");
                }

                if (witchTargetId !== null) {
                    if (witchTargetId === protectionTargetId) {
                        showToast(`平安夜！`);
                    } else {
                        if (witchTargetId === myPlayerId && userConfessed) {
                            if (isOfficialSecret) {
                                // Saved
                            } else {
                                const p = newPlayers[myPlayerId];
                                const role = getEffectiveRole(p, newPlayers);
                                const unrevealed = p.identityCards.filter(c => !c.isRevealed);
                                if (unrevealed.length > 0) {
                                    unrevealed[0].isRevealed = true;
                                    showToast(`${p.character.name} 自首并翻开了身份`);
                                }
                            }
                        } else {
                            newPlayers[witchTargetId].isDead = true;
                            handlePlayerDeath(witchTargetId);
                        }
                    }
                }

                showToast("天亮了...");
                setPhase(Phase.DAY_TURN);
                let newDrawPile = [...deck, ...discardPile];
                const nightIndex = newDrawPile.findIndex(c => c.name === '黑夜');
                let nightCard = null;
                if(nightIndex > -1) {
                     nightCard = newDrawPile.splice(nightIndex, 1)[0];
                }
                newDrawPile = shuffle(newDrawPile);
                if(nightCard) newDrawPile.unshift(nightCard);
                setDeck(newDrawPile);
                setDiscardPile([]);
                setPlayers(newPlayers);
            };

            const useStorytellerSkill = () => {
                 const newDeck = shuffle([...deck]);
                 setDeck(newDeck);
                 const newPlayers = [...players];
                 newPlayers[myPlayerId].storytellerUsed = true;
                 setPlayers(newPlayers);
                 showToast("说书人技能：牌堆已洗牌");
            };

            // --- RENDER METHODS ---
            
            const renderLanding = () => (
                <div className="min-h-screen flex flex-col items-center justify-center bg-black text-center animate-fade-in p-4 relative overflow-hidden">
                    <div className="absolute inset-0 z-0 opacity-60 bg-[url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2568&auto=format&fit=crop')] bg-cover bg-center grayscale contrast-125"></div>
                    <div className="absolute inset-0 z-0 bg-gradient-to-t from-black via-transparent to-black opacity-90"></div>
                    
                    <div className="z-10 flex flex-col items-center max-w-3xl">
                        <h1 className="text-6xl md:text-8xl font-black text-[#e7e5e4] tracking-wider mb-2 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] font-serif">女巫镇</h1>
                        <p className="text-xl text-[#a8a29e] italic mb-12 font-serif px-4 tracking-widest">“小镇即将迎来它的第一波客人...”</p>
                        
                        <div className="flex gap-4">
                            <button onClick={() => { setIsHost(false); setView(View.JOIN_ROOM); }} className="bg-[#78350f] text-[#e7e5e4] px-6 py-3 rounded font-bold hover:bg-[#92400e] shadow-lg border border-[#451a03] flex items-center gap-2 transition-transform hover:-translate-y-1">
                                <UserPlus size={18} /> 加入房间
                            </button>
                            <button onClick={startSetupHost} className="bg-purple-800 hover:bg-purple-900 text-white px-6 py-3 rounded font-bold shadow-lg border border-purple-900 flex items-center gap-2 transition-transform hover:-translate-y-1">
                                <Users size={18} /> 好友对战
                            </button>
                            <button onClick={() => setView(View.RULES)} className="bg-[#292524] text-[#e7e5e4] px-6 py-3 rounded font-bold hover:bg-[#44403c] shadow-lg border border-[#57534e] flex items-center gap-2 transition-transform hover:-translate-y-1">
                                <BookOpen size={18} /> 小镇规则
                            </button>
                            <button onClick={() => setIsSettingsOpen(true)} className="bg-[#1c1917] text-[#e7e5e4] px-4 py-3 rounded font-bold hover:bg-[#292524] shadow-lg border border-[#57534e] flex items-center gap-2 transition-transform hover:-translate-y-1">
                                <Settings size={18} /> 游戏设置

                                            </button>
                                        )}
                                        
                                        <button onClick={() => resolveDawn(false)} className="px-3 py-1 bg-[#b91c1c] border border-[#991b1b] text-white rounded text-xs hover:bg-[#991b1b]">不想自首</button>
                                    </div>
                                </div>
                            )}

                            {/* My Hand Cards */}
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-end justify-center gap-1 z-50 w-full max-w-2xl pointer-events-none">
                                {me && me.hand.map((card, index) => (
                                    <div key={card.id} className="pointer-events-auto transform transition-transform hover:-translate-y-4" style={{zIndex: index}}>
                                        <Card 
                                            card={card} 
                                            isSelected={selectedCardIds.includes(card.id)}
                                            onClick={(c) => handlePlayCard(c)}
                                            disabled={!isMyTurn || (me.hand.some(h => h.type === CardType.BLACK) && card.type !== CardType.BLACK)}
                                        />
                                    </div>
                                ))}
                            </div>
                            
                            {/* Circular Action Buttons - Right Side */}
                            <div className="absolute bottom-6 right-4 md:right-8 flex flex-row gap-4 pointer-events-auto items-end">
                                    {isMyTurn && phase === Phase.DAY_TURN && (
                                        me.hand.some(c => c.type === CardType.BLACK) ? (
                                            <button onClick={() => handlePlayCard(me.hand.find(c => c.type === CardType.BLACK))} 
                                                className="w-20 h-20 rounded-full bg-[#581c87] text-white flex flex-col items-center justify-center gap-1 animate-pulse shadow-xl border-2 border-[#3b0764] hover:scale-105 transition-transform">
                                                <Skull className="w-8 h-8" />
                                                <span className="text-[10px] font-bold">打出黑卡</span>
                                            </button>
                                        ) : (
                                            <>
                                                {girlCanJudge && !hasPlayedCard && (
                                                    <button 
                                                        onClick={handleGirlTrialStart}
                                                        className="w-16 h-16 rounded-full bg-[#92400e] hover:bg-[#b45309] text-[#fef3c7] flex flex-col items-center justify-center shadow-xl border-2 border-[#78350f] hover:scale-105 transition-all animate-bounce"
                                                    >
                                                        <Scale className="w-6 h-6 mb-1" />
                                                        <span className="text-[10px] font-bold">审判</span>
                                                    </button>
                                                )}

                                                <button 
                                                    disabled={hasPlayedCard}
                                                    onClick={() => handleDrawCards(2, false, true)}
                                                    className="w-16 h-16 rounded-full bg-[#292524] hover:bg-[#44403c] text-[#e6e0d4] flex flex-col items-center justify-center shadow-xl disabled:opacity-60 transition-all border-2 border-[#57534e] hover:scale-105"
                                                >
                                                    <Hand className="w-6 h-6 mb-1" />
                                                    <span className="text-[10px]">摸牌</span>
                                                </button>
                                                
                                                <button 
                                                    disabled={!hasPlayedCard && me.hand.length > 0} 
                                                    onClick={() => endTurn(players)}
                                                    className="w-20 h-20 rounded-full bg-[#991b1b] hover:bg-[#b91c1c] text-[#f5f5f4] flex flex-col items-center justify-center shadow-xl disabled:opacity-60 transition-all border-2 border-[#7f1d1d] hover:scale-105"
                                                >
                                                    <X className="w-8 h-8 mb-1" />
                                                    <span className="text-xs font-bold">结束回合</span>
                                                </button>
                                            </>
                                        )
                                    )}
                            </div>
                        </div>
                        
                        {(phase === Phase.NIGHT_WITCH && !amWitch) || (phase === Phase.NIGHT_CONSTABLE && !amConstable) || (phase === Phase.INITIAL_NIGHT && !amWitch) ? (
                            <div className="fixed inset-0 bg-[#000000]/95 z-[200] flex items-center justify-center">
                                <div className="text-center animate-pulse">
                                    <Moon className="w-20 h-20 text-[#a855f7] mx-auto mb-4 opacity-80"/>
                                    <h2 className="text-2xl font-serif text-[#e6e0d4] tracking-widest">
                                        {phase === Phase.INITIAL_NIGHT ? '女巫请睁眼放黑猫...' : '天黑请闭眼...'}
                                    </h2>
                                </div>
                            </div>
                        ) : null}

                    </div>
                );
            };

            return (
                <>
                    {/* BGM Audio Element */}
                    <audio ref={audioRef} src="./assets/bgm.mp3" loop autoPlay />

                    {isSettingsOpen && (
                        <SettingsModal 
                            volume={bgmVolume} 
                            onVolumeChange={setBgmVolume}
                            onClose={() => setIsSettingsOpen(false)}
                        />
                    )}

                    {(() => {
                        switch(view) {
                            case View.LANDING: return renderLanding();
                            case View.RULES: return renderRules();
                            case View.SETUP_HOST: return renderSetupHost();
                            case View.JOIN_ROOM: return renderJoinRoom();
                            case View.WAITING_ROOM: return renderWaitingRoom();
                            case View.CHAR_SELECT: return renderCharSelect();
                            case View.GAME: return renderGame();
                            default: return renderLanding();
                        }
                    })()}
                </>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<SalemGame />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
